<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <defs>

    <linearGradient id="grad-border" x1="15%" y1="85%" x2="85%" y2="15%">
      <stop offset="0%"   stop-color="#00a8d6"/>
      <stop offset="100%" stop-color="#00d4f0"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

  </defs>

  <!-- Jemný glow za obrysom -->
  <polygon points="110,18 190,62 190,150 110,194 30,150 30,62"
           fill="none"
           stroke="#00a8d6" stroke-width="5"
           opacity="0.18" filter="url(#glow)"/>

  <!-- Outline border — gradient ťah -->
  <polygon points="110,18 190,62 190,150 110,194 30,150 30,62"
           fill="rgba(0,117,153,0.04)"
           stroke="url(#grad-border)" stroke-width="1.5" stroke-opacity="0.72"/>

</svg>
