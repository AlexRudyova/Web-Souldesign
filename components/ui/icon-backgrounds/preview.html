<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Icon Backgrounds – Hexagon Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #002535;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 72px;
      padding: 80px 60px;
      font-family: 'Frank Ruhl Libre', Georgia, serif;
      /* Textúra za hexagónmi — glass efekt je viditeľnejší */
      background-image:
        radial-gradient(ellipse 60% 50% at 30% 40%, rgba(0,117,153,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 75% 65%, rgba(0,163,201,0.10) 0%, transparent 55%);
    }

    .section-label {
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 32px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }


    /* ═══════════════════════════════════════════════
       SHARED — obsah vnútri hexagónu
    ═══════════════════════════════════════════════ */

    .hex-symbol {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    .hex-symbol svg {
      width: 52px;
      height: 52px;
    }

    .hex-symbol span {
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.82);
      font-weight: 400;
    }


    /* ═══════════════════════════════════════════════
       FILLED
       SVG img pozadie
    ═══════════════════════════════════════════════ */

    .hex-filled {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.32s ease;
      filter: drop-shadow(0 0 0px rgba(0,117,153,0));
    }

    .hex-filled:hover {
      transform: translateY(-6px) scale(1.04);
      filter: drop-shadow(0 10px 28px rgba(0,117,153,0.50));
    }

    .hex-filled__bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }


    /* ═══════════════════════════════════════════════
       OUTLINE
       SVG img pozadie
    ═══════════════════════════════════════════════ */

    .hex-outline {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.32s ease;
      filter: drop-shadow(0 0 0px rgba(0,117,153,0));
    }

    .hex-outline:hover {
      transform: translateY(-6px) scale(1.04);
      filter: drop-shadow(0 10px 28px rgba(0,117,153,0.40));
    }

    .hex-outline__bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transition: opacity 0.28s ease;
    }

    /* Na hover zosvetlíme border cez druhý SVG s opacity 1 */
    .hex-outline__bg--hover {
      opacity: 0;
      transition: opacity 0.28s ease;
    }

    .hex-outline:hover .hex-outline__bg--base  { opacity: 0; }
    .hex-outline:hover .hex-outline__bg--hover { opacity: 1; }

    .hex-outline .hex-symbol span { color: rgba(255,255,255,0.70); }
    .hex-outline:hover .hex-symbol span { color: rgba(255,255,255,0.90); }


    /* ═══════════════════════════════════════════════
       GLASS
       CSS wrapper architektúra (rovnaká ako glass button)
       — clip-path + backdrop-filter + SVG border mimo clip-path
    ═══════════════════════════════════════════════ */

    /* Tvar hexagónu (pointy-top, 220×220) */
    /* polygon: 50% 8.2%, 86.4% 28.2%, 86.4% 68.2%, 50% 88.2%, 13.6% 68.2%, 13.6% 28.2% */

    .hex-glass-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      filter: drop-shadow(0 0 0px rgba(0,117,153,0));
      transition: transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.32s ease;
    }

    .hex-glass-wrap:hover {
      transform: translateY(-6px) scale(1.04);
      filter: drop-shadow(0 10px 28px rgba(0,117,153,0.40));
    }

    /* 1. Skosená plocha s blur efektom */
    .hex-glass__fill {
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 8.2%, 86.4% 28.2%, 86.4% 68.2%, 50% 88.2%, 13.6% 68.2%, 13.6% 28.2%);
      background: linear-gradient(135deg, rgba(0,117,153,0.44) 0%, rgba(0,117,153,0.16) 100%);
      backdrop-filter: blur(10px) saturate(1.4);
      -webkit-backdrop-filter: blur(10px) saturate(1.4);
      transition: background 0.30s ease;
    }

    .hex-glass-wrap:hover .hex-glass__fill {
      background: linear-gradient(135deg, rgba(0,117,153,0.58) 0%, rgba(0,163,201,0.24) 100%);
    }

    /* 2. SVG border mimo clip-path */
    .hex-glass__border {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
      z-index: 2;
    }

    .hex-glass__border-path {
      stroke: rgba(0,168,214,0.72);
      fill: transparent;
      transition: stroke 0.30s ease;
    }

    .hex-glass-wrap:hover .hex-glass__border-path {
      stroke: rgba(0,181,216,0.95);
    }

    /* Obsah (stredová vrstva) */
    .hex-glass__content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .hex-glass-wrap .hex-symbol span { color: rgba(255,255,255,0.78); }


    /* ═══════════════════════════════════════════════
       OUTLINE SVG hover — pomocný SVG s plnou opacity bordera
    ═══════════════════════════════════════════════ */

    .hex-outline-hover-svg {
      display: none; /* len pre generovanie inline hover efektu */
    }

    /* ── Sova: inline SVG vo vnútri hexagónu ── */
    .owl-svg {
      width: 105px;
      height: 110px;
    }
    .owl-svg--white { color: rgba(255,255,255,0.92); }
    .owl-svg--teal  { color: #00b5d8; }

  </style>
</head>
