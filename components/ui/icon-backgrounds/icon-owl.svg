  <line x1="68" y1="94" x2="72" y2="126" stroke="currentColor" stroke-width="1.3"/>
  <line x1="132" y1="94" x2="128" y2="126" stroke="currentColor" stroke-width="1.3"/>
  <line x1="78" y1="108" x2="72" y2="126" stroke="currentColor" stroke-width="1.3"/>
