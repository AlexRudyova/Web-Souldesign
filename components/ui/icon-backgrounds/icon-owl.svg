  <!-- ── OČI ── -->
  <circle cx="84" cy="76" r="9.5" stroke="currentColor" stroke-width="1.6" fill="none"/>
  <circle cx="84" cy="76" r="3.5" fill="currentColor"/>
  <circle cx="116" cy="76" r="9.5" stroke="currentColor" stroke-width="1.6" fill="none"/>
