  <line x1="76" y1="178" x2="100" y2="162" stroke="currentColor" stroke-width="1.2"/>
  <line x1="124" y1="178" x2="100" y2="162" stroke="currentColor" stroke-width="1.2"/>

  <!-- ── KRÍDLA (bočné) ── -->
  <path d="M72 126 L48 114 L53 146 L62 156"
