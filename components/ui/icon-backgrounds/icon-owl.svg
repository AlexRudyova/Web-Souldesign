  <!-- Ľavý ušný chochol -->
  <path d="M79 61 L72 38 L88 54" stroke="currentColor" stroke-width="1.6" fill="none"/>
  <!-- Pravý ušný chochol -->
  <path d="M121 61 L128 38 L112 54" stroke="currentColor" stroke-width="1.6" fill="none"/>

