<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soul Design – Kreatívna online podpora</title>
  <meta name="description" content="Webové stránky, grafický design a kreatívna online podpora pre váš business. Soul Design – design that connects." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════
       RESET & TOKENS
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --teal:        #007599;
      --teal-mid:    #005f7a;
      --teal-dark:   #003d52;
      --teal-deeper: #002535;
      --teal-glow:   #00a3c9;
      --teal-pale:   #4ecde8;
      --white:       #ffffff;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--teal-deeper);
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════════
       HEADER / NAVBAR
    ═══════════════════════════════════════════════ */
    .site-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: clamp(16px,2.4vh,26px) clamp(24px,5vw,72px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,25,38,0.50) 0%, transparent 100%);
    }

    /* Logo – larger, using "Logo do hlavicky" */
    .header__logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      flex-shrink: 0;
    }
    .header__logo img {
      /* Taller logo for header */
      height: clamp(44px, 6vh, 68px);
      width: auto;
      /* White version on dark bg */
      filter: brightness(0) invert(1);
      opacity: 0.90;
      transition: opacity 0.3s ease;
    }
    .header__logo:hover img { opacity: 1; }

    /* Nav list */
    .header__nav {
      display: flex;
      align-items: center;
      gap: clamp(20px, 2.8vw, 40px);
      list-style: none;
    }

    .header__nav a {
      font-family: 'Lora', serif;
      font-size: clamp(11px, 1vw, 13px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      text-decoration: none;
      position: relative;
      transition: color 0.28s ease;
    }
    .header__nav a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--teal-pale);
      transition: width 0.32s ease;
    }
    .header__nav a:hover { color: #fff; }
    .header__nav a:hover::after { width: 100%; }

    /* ── Kontakt CTA – same gradient as main hero button ── */
    .nav__cta {
      display: inline-flex !important;
      align-items: center;
      padding: 11px 28px !important;
      border-radius: 50px;
      font-family: 'Lora', serif;
      font-size: clamp(11px, 0.95vw, 13px) !important;
      font-weight: 500;
      letter-spacing: 0.12em !important;
      color: var(--white) !important;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.22);
      position: relative;
      overflow: hidden;
      isolation: isolate;
      transition:
        transform 0.32s cubic-bezier(.22,.61,.36,1),
        box-shadow 0.32s ease;
      box-shadow:
        0 5px 24px rgba(0,117,153,0.45),
        inset 0 1px 0 rgba(255,255,255,0.10);
    }
    .nav__cta::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50px;
      background: linear-gradient(118deg, #005f7a 0%, #007599 40%, #00a3c9 100%);
      z-index: -1;
      transition: opacity 0.36s ease;
    }
    .nav__cta::after {
      content: '';
      position: absolute; inset: 0; border-radius: 50px;
      background: linear-gradient(118deg, #007599 0%, #00b5d8 55%, #006585 100%);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.36s ease;
    }
    .nav__cta:hover::after { opacity: 1; }
    .nav__cta:hover {
      color: var(--white) !important;
      transform: translateY(-2px);
      box-shadow:
        0 10px 36px rgba(0,163,201,0.52),
        inset 0 1px 0 rgba(255,255,255,0.14);
    }
    /* Suppress the underline for this link */
    .nav__cta::after { border-radius: 50px; }
    /* Override the text underline pseudo from the base rule */
    li:has(.nav__cta) a::after { display: none !important; }

    /* Mobile burger */
    .header__burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .header__burger span {
      display: block;
      width: 24px; height: 1.5px;
      background: rgba(255,255,255,0.80);
      border-radius: 2px;
    }

    /* ═══════════════════════════════════════════════
       HERO WRAPPER
    ═══════════════════════════════════════════════ */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 620px;
      overflow: hidden;
      display: flex;
      align-items: center;
      -webkit-mask-image: linear-gradient(to bottom,
        black             0%,
        black            91%,
        rgba(0,0,0,0.82) 93%,
        rgba(0,0,0,0.55) 95%,
        rgba(0,0,0,0.22) 97%,
        rgba(0,0,0,0.05) 99%,
        transparent      100%
      );
      mask-image: linear-gradient(to bottom,
        black             0%,
        black            91%,
        rgba(0,0,0,0.82) 93%,
        rgba(0,0,0,0.55) 95%,
        rgba(0,0,0,0.22) 97%,
        rgba(0,0,0,0.05) 99%,
        transparent      100%
      );
    }

    /* ── PHOTO: right side, more zoomed-out ── */
    /* ── PHOTO: right side, more zoomed-out ── */
    .hero__photo {
      position: absolute;
      top: 0;
      right: 0;
      width: 65%; /* Wider container with mask-image prevents sharp edges and allows zoom-out */
      height: 100%;
      z-index: 0;
      mask-image: linear-gradient(to right, transparent 0%, rgba(0, 0, 0, 0.15) 15%, #000 38%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0, 0, 0, 0.15) 15%, #000 38%);
      will-change: transform;
    }
    .hero__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Aligned top, slightly left-of-centre for natural framing */
      object-position: 42% top;
      display: block;
      will-change: transform;
      /* Cinematic load zoom-out animation (Ken Burns) */
      transform: scale(1.06);
      animation: heroPhotoReveal 6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes heroPhotoReveal {
      to {
        transform: scale(1);
      }
    }

    /* ── SMOOTH TEAL GRADIENT OVERLAY (Hero vzor style) ── */
    .hero__overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(
        to right,
        #002535 0%,
        #002535 24%,
        #003d52 35%,
        #005f7a 46%,
        rgba(0, 95, 122, 0.4) 58%,
        rgba(0, 117, 153, 0.08) 68%,
        transparent 78%
      );
    }

    /* ── BOTTOM VIGNETTE ── */
    .hero__vignette {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: linear-gradient(
        to top,
        rgba(0,20,30,0.45) 0%,
        transparent 35%
      );
    }

    /* ═══════════════════════════════════════════════
       LOUVER LAYER (3D Blinds)
       – covers the photo area, opening left to right
    ═══════════════════════════════════════════════ */
    .hero__louvers {
      position: absolute;
      top: 0;
      right: -10vw;
      width: 85vw;
      height: 100%;
      z-index: 4;
      display: flex;
      pointer-events: none;
      transform: skewX(14deg); /* Slanted zlava doprava (slash direction) */
      transform-origin: top left;
      mask-image: linear-gradient(to right, transparent 0%, black 7%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 7%);
    }

    .louver-blade {
      flex: 1;
      height: 100%;
      position: relative;
      overflow: hidden;
      /* Frosted glass panel */
      backdrop-filter: blur(12px) saturate(1.4) brightness(0.85);
      -webkit-backdrop-filter: blur(12px) saturate(1.4) brightness(0.85);
      /* Panel frame edges */
      border-left: 1px solid rgba(255, 255, 255, 0.20);
      border-right: 1px solid rgba(0, 0, 0, 0.12);
      /* Depth shadow between panels */
      box-shadow: -4px 0 22px rgba(0, 0, 0, 0.35), inset 1px 0 0 rgba(255,255,255,0.07);
      margin-right: -1px;
      transition:
        transform 1.8s cubic-bezier(0.16, 1, 0.3, 1),
        opacity 1.6s cubic-bezier(0.16, 1, 0.3, 1),
        box-shadow 1.6s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, opacity;
    }

    /* Diagonal glass shine */
    .louver-blade::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        108deg,
        rgba(255,255,255,0.13) 0%,
        rgba(255,255,255,0.04) 38%,
        transparent 58%
      );
      pointer-events: none;
      z-index: 1;
    }

    .louver-blade.open {
      transform: translateX(110%);
      opacity: 0;
      box-shadow: 0 0 0 transparent;
    }

    /* ═══════════════════════════════════════════════
       HUMMINGBIRD (Video with Screen Blend & White filter)
    ═══════════════════════════════════════════════ */
    .hero__hummingbird {
      position: absolute;
      z-index: 15;
      pointer-events: none;
      top: 0; left: 0;
      width: clamp(140px, 18vw, 240px); /* Slightly larger */
      height: auto;
      opacity: 0;
      mix-blend-mode: screen; /* Transparent black background */
      filter: 
        grayscale(100%) 
        contrast(300%) 
        brightness(3.5); /* Boosted contrast forces dark-gray compression artifacts to black, removing the visible container box */
      will-change: transform, opacity;
    }

    /* ═══════════════════════════════════════════════
       CONTENT GRID
    ═══════════════════════════════════════════════ */
    .hero__content {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding:
        clamp(100px, 13vh, 150px)
        clamp(24px, 5.5vw, 80px)
        clamp(80px, 10vh, 120px);
      display: grid;
      grid-template-columns: 46% 54%;
      align-items: center;
      min-height: 100vh;
    }

    .hero__text { max-width: 530px; padding-top: 250px; }

    /* ── HEADING ── */
    .hero__heading {
      font-family: 'Frank Ruhl Libre', Georgia, serif;
      font-weight: 700;
      font-size: clamp(36px, 4.8vw, 70px);
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--white);
      margin-bottom: clamp(10px, 1.4vh, 16px);
      opacity: 0;
      transform: translateY(24px);
    }
    .hero__heading .line-italic {
      display: block;
      font-style: italic;
      font-weight: 400;
      /* Gradient text matching teal brand palette */
      background: linear-gradient(95deg, #ffffff 0%, #a8eef8 55%, var(--teal-pale) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 4px;
    }

    /* ── SUB 1 ── */
    .hero__sub1 {
      font-family: 'Frank Ruhl Libre', Georgia, serif;
      font-size: clamp(19px, 2.4vw, 30px);
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.86);
      line-height: 1.5;
      margin-bottom: clamp(18px, 2.8vh, 28px);
      opacity: 0;
      transform: translateY(18px);
    }

    /* ── SERVICES ── */
    .hero__services {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: clamp(36px, 5.5vh, 60px);
      opacity: 0;
      transform: translateY(14px);
    }
    .svc-item {
      font-family: 'Lora', serif;
      font-size: clamp(9px, 0.9vw, 12px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }
    .svc-sep {
      width: 1px; height: 12px;
      background: rgba(255,255,255,0.22);
      margin: 0 14px;
      flex-shrink: 0;
    }

    /* ── CTA BUTTON ── */
    .hero__cta {
      opacity: 0;
      transform: translateY(14px);
    }

    .cta-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      width: 325px;
      height: 74px;
      padding: 0 28px;
      text-decoration: none;
      cursor: pointer;
      transition: filter 300ms ease;
    }

    .cta-btn__left {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .cta-btn__icon {
      display: block;
      width: auto;
      height: auto;
      max-width: 68px;
      max-height: 56px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      flex-shrink: 0;
    }

    .cta-btn__divider {
      flex-shrink: 0;
      display: block;
      width: 1px;
      height: 34px;
      background: rgba(255, 255, 255, 0.18);
      margin: 0 20px;
    }

    .cta-btn__text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #ffffff;
      white-space: nowrap;
      user-select: none;
    }

    .cta-btn__arrow {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      transition: transform 300ms ease;
    }

    .cta-btn--filled {
      isolation: isolate;
      overflow: hidden;
      clip-path: path("M 22 0 L 315 0 A 10 10 0 0 1 325 10 L 325 52 L 303 74 L 10 74 A 10 10 0 0 1 0 64 L 0 22 Z");
      filter: drop-shadow(0 0 0px rgba(0, 117, 153, 0));
    }
    .cta-btn--filled::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(118deg, #005f7a 0%, #007599 40%, #00a3c9 100%);
      z-index: -1;
    }
    .cta-btn--filled::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(118deg, #007599 0%, #00b5d8 55%, #006585 100%);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.36s ease;
    }
    .cta-btn--filled:hover::after { opacity: 1; }
    .cta-btn--filled:hover {
      filter: drop-shadow(0 0 18px rgba(0, 117, 153, 0.18));
    }
    .cta-btn--filled:hover .cta-btn__arrow { transform: translateX(4px); }

    /* Right photo spacer */
    .hero__photo-spacer { min-height: 1px; }

    /* ── BOTTOM ACCENT ── */
    .hero__accent-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 26;
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(78,205,232,0.28) 20%,
        rgba(0,163,201,0.88) 50%,
        rgba(0,117,153,0.28) 80%,
        transparent 100%
      );
    }

    /* ═══════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════ */
    @media (max-width: 960px) {
      .hero__content {
        grid-template-columns: 1fr;
        align-items: flex-end;
        padding-bottom: clamp(70px,10vh,100px);
      }
      .hero__photo {
        width: 100%;
        right: 0;
        mask-image: none;
        -webkit-mask-image: none;
      }
      .hero__photo img {
        object-position: 68% top;
        transform: none;
        animation: none;
      }
      .hero__overlay {
        background: linear-gradient(
          to top,
          #002535 0%,
          #002535 30%,
          rgba(0,37,53,0.92) 50%,
          rgba(0,61,82,0.70) 70%,
          rgba(0,95,122,0.30) 85%,
          transparent 100%
        );
      }
      .hero__louvers {
        width: 120%;
        left: -10%;
        transform: skewX(8deg);
      }
      .hero__text    { max-width: 100%; }
      .hero__photo-spacer { display: none; }
      .header__nav  { display: none; }
      .header__burger { display: flex; }
    }

    @media (max-width: 540px) {
      .hero__heading { font-size: clamp(28px, 8vw, 42px); }
      .hero__sub1    { font-size: clamp(17px, 5vw, 22px); }
      .svc-sep       { margin: 0 10px; }
    }

    /* ── BOTTOM SECTION TRANSITION FADE ── */
    .hero__fade-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 220px;
      z-index: 19;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(233, 243, 246, 0)    0%,
        rgba(244, 242, 238, 0.45) 45%,
        rgba(244, 242, 238, 0.85) 75%,
        #f4f2ee                   100%
      );
    }

    /* ─ Reduced motion ─ */
    @media (prefers-reduced-motion: reduce) {
      #anim-heading, #anim-sub1, #anim-services, #anim-cta {
        opacity: 1 !important; transform: none !important; transition: none !important;
      }
      .hero__louvers     { display: none; }
      .hero__hummingbird { display: none; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     HEADER
══════════════════════════════════════════════ -->
<header class="site-header" id="site-header">
  <a href="/" class="header__logo" aria-label="Soul Design – domov">
    <img
      src="Obrazky/Logo/Logo do hlavicky.png"
      alt="Soul Design – Design That Connects"
      loading="eager"
    />
  </a>

  <nav aria-label="Hlavná navigácia">
    <ul class="header__nav">
      <li><a href="#uvod">Úvod</a></li>
      <li><a href="#sluzby">Služby</a></li>
      <li><a href="#cennik">Cenník</a></li>
      <li><a href="#omne">O mne</a></li>
      <li><a href="#kontakt" class="nav__cta">Kontakt</a></li>
    </ul>
  </nav>

  <button class="header__burger" aria-label="Otvoriť menu" aria-expanded="false" id="burger-btn">
    <span></span><span></span><span></span>
  </button>
</header>


<!-- ══════════════════════════════════════════════
     HERO SECTION
══════════════════════════════════════════════ -->
<section class="hero" id="hero" aria-label="Hero sekcia – Soul Design">

  <!-- LAYER 0: Photo (right-anchored, zoomed out) -->
  <div class="hero__photo" id="hero-photo-container" aria-hidden="true">
    <img
      id="hero-photo"
      src="Obrazky/Hlavne/Hero sekcia.PNG"
      alt="Kreatívna špecialistka Soul Design"
      loading="eager"
      decoding="async"
      fetchpriority="high"
    />
  </div>

  <!-- LAYER 1: Smooth teal left-to-right gradient overlay -->
  <div class="hero__overlay" aria-hidden="true"></div>

  <!-- LAYER 3: Bottom vignette -->
  <div class="hero__vignette" aria-hidden="true"></div>

  <!-- LAYER 4: 3D Louver Blinds -->
  <div class="hero__louvers" id="louvers-container" aria-hidden="true"></div>

  <!-- LAYER 5: Hummingbird Video -->
  <video
    class="hero__hummingbird"
    id="hummingbird"
    autoplay
    loop
    muted
    playsinline
    preload="auto"
    aria-hidden="true"
    role="presentation"
  >
    <source src="Obrazky/Logo/video kolibrik.mp4" type="video/mp4" />
  </video>

  <!-- LAYER 6: Text content -->
  <div class="hero__content">
    <div class="hero__text">

      <h1 class="hero__heading" id="anim-heading">
        Predstavte svetu
        <span class="line-italic">svoj business,</span>
      </h1>

      <p class="hero__sub1" id="anim-sub1">
        ja sa postarám o ten zvyšok.
      </p>

      <div class="hero__services" id="anim-services" role="list">
        <span class="svc-item" role="listitem">Webové stránky</span>
        <span class="svc-sep" aria-hidden="true"></span>
        <span class="svc-item" role="listitem">Grafický design</span>
        <span class="svc-sep" aria-hidden="true"></span>
        <span class="svc-item" role="listitem">Kreatívna online podpora</span>
      </div>

      <div class="hero__cta" id="anim-cta">
        <a href="#sluzby" class="cta-btn cta-btn--filled" id="cta-btn">
          <span class="cta-btn__left">
            <img class="cta-btn__icon"
                 src="Obrazky/Logo/Kolibrik logo.png"
                 alt="" aria-hidden="true" draggable="false"/>
            <span class="cta-btn__divider" aria-hidden="true"></span>
            <span class="cta-btn__text">Pozrieť služby</span>
          </span>
          <span class="cta-btn__arrow" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <line x1="3" y1="12" x2="20" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <polyline points="14,6 20,12 14,18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>
      </div>

    </div><!-- /.hero__text -->
    <div class="hero__photo-spacer" aria-hidden="true"></div>
  </div><!-- /.hero__content -->

  <!-- BOTTOM TRANSITION FADE: above photo/louvers, below content -->
  <div class="hero__fade-bottom" aria-hidden="true"></div>

  <div class="hero__accent-bar" aria-hidden="true"></div>

</section>


<!-- ══════════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  /* ── Reduced motion ─────────────────────────────────── */
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    ['anim-heading','anim-sub1','anim-services','anim-cta'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.opacity = '1'; el.style.transform = 'none'; }
    });
    return;
  }

  /* ══ CONFIG ═══════════════════════════════════════════ */
  const C = {
    /* Louver settings */
    bladeCount:     8,        // fewer and wider blades
    bladeOpenDur:  1600,      // ms each blade takes to fully open
    bladeDelay:    100,       // starts almost immediately

    /* Hummingbird */
    hbDelay:        100,      // starts flying immediately with the blades
    hbDur:         5000,      // slower, more graceful flight
    /* No wing-beat bobbing — only smooth path */

    /* Text reveal */
    textDelay:     1500,      // slightly faster text reveal
    textStep:      100,
  };

  const RAF = requestAnimationFrame;

  /* ── Easing ─────────────────────────────────────────── */
  const easeOutCubic = t => 1 - Math.pow(1-t, 3);

  /* ══ LOUVER GENERATOR ═════════════════════════════════ */
  const bladesContainer = document.getElementById('louvers-container');
  const blades = [];
  if (bladesContainer) {
    const rect = bladesContainer.getBoundingClientRect();
    const L = rect.left;
    const W = rect.width;

    for (let i = 0; i < C.bladeCount; i++) {
      const blade = document.createElement('div');
      blade.className = 'louver-blade';
      
      // Semi-transparent frosted glass tint: darker/more opaque on left, lighter on right
      const p = i / (C.bladeCount - 1);
      const g = Math.round(30 + p * 55);
      const b = Math.round(48 + p * 72);
      const a = (0.58 - p * 0.20).toFixed(2);
      blade.style.background = `rgba(0, ${g}, ${b}, ${a})`;
      
      bladesContainer.appendChild(blade);
      
      // Calculate individual blade trigger point based on its layout position
      const xTrigger = L + (i / C.bladeCount) * W;
      blades.push({
        el: blade,
        xTrigger: xTrigger,
        opened: false
      });
    }
  }

  // Safety fallback: if hummingbird fails or is blocked, open blades automatically
  let fallbackTimeout = setTimeout(() => {
    blades.forEach((b, i) => {
      setTimeout(() => {
        if (!b.opened) {
          b.opened = true;
          b.el.classList.add('open');
        }
      }, i * 100);
    });
  }, 3000);

  /* ══ HUMMINGBIRD – pure smooth path, no bobbing ═══════ */
  const hb   = document.getElementById('hummingbird');
  let   hbT0 = null;

  function hbFrame(now) {
    if (!hbT0) hbT0 = now;
    const elapsed = now - hbT0;
    const t   = Math.min(1, elapsed / C.hbDur);
    const et  = easeOutCubic(t);

    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const sz = hb.offsetWidth || 180;

    // Bezier control points
    // Enters from left at mid-height, sweeps gracefully up-right, exits right
    const P0 = { x: -sz - 30,      y: vh * 0.58 };
    const P1 = { x: vw * 0.20,     y: vh * 0.35 };
    const P2 = { x: vw * 0.48,     y: vh * 0.24 };
    const P3 = { x: vw + sz + 30,  y: vh * 0.30 };

    const mt  = 1 - et;
    const bx  = mt*mt*mt*P0.x + 3*mt*mt*et*P1.x + 3*mt*et*et*P2.x + et*et*et*P3.x;
    const by  = mt*mt*mt*P0.y + 3*mt*mt*et*P1.y + 3*mt*et*et*P2.y + et*et*et*P3.y;

    // Smooth tangent rotation
    const step = 0.012;
    const et2  = Math.min(1, et + step);
    const mt2  = 1 - et2;
    const bx2  = mt2*mt2*mt2*P0.x + 3*mt2*mt2*et2*P1.x + 3*mt2*et2*et2*P2.x + et2*et2*et2*P3.x;
    const by2  = mt2*mt2*mt2*P0.y + 3*mt2*mt2*et2*P1.y + 3*mt2*et2*et2*P2.y + et2*et2*et2*P3.y;
    const angle = Math.atan2(by2 - by, bx2 - bx) * 180 / Math.PI;

    // Opacity: gentle fade in/out
    let alpha = 1;
    if (t < 0.07) alpha = t / 0.07;
    if (t > 0.93) alpha = (1 - t) / 0.07;

    hb.style.opacity   = String(alpha);
    hb.style.transform = `translate(${bx}px, ${by}px) rotate(${angle}deg)`;

    /* ── DYNAMIC BLADES OPENING SYNCED TO HUMMINGBIRD POSITION ── */
    blades.forEach((b) => {
      if (!b.opened && bx >= b.xTrigger) {
        b.opened = true;
        b.el.classList.add('open');
      }
    });

    if (t < 1) {
      RAF(hbFrame);
    } else {
      hb.style.opacity = '0';
      // Ensure all blades are opened at the end
      blades.forEach(b => {
        if (!b.opened) {
          b.opened = true;
          b.el.classList.add('open');
        }
      });
    }
  }

  setTimeout(() => {
    // Cancel fallback since hummingbird is starting
    clearTimeout(fallbackTimeout);
    hbT0 = null;
    RAF(hbFrame);
    // Play the video synced with flight start
    if (hb && typeof hb.play === 'function') {
      hb.currentTime = 0;
      hb.play().catch(e => console.log('Autoplay play trigger log:', e));
    }
  }, C.hbDelay);

  /* ══ TEXT REVEAL ══════════════════════════════════════ */
  ['anim-heading','anim-sub1','anim-services','anim-cta'].forEach((id, i) => {
    const el = document.getElementById(id);
    if (!el) return;
    setTimeout(() => {
      el.style.transition =
        `opacity 0.9s cubic-bezier(.22,.61,.36,1),
         transform 0.9s cubic-bezier(.22,.61,.36,1)`;
      el.style.opacity   = '1';
      el.style.transform = 'translateY(0)';
    }, C.textDelay + i * C.textStep);
  });

  /* ══ SUBTLE SCROLL PARALLAX ═══════════════════════════ */
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (ticking) return;
    ticking = true;
    RAF(() => {
      const sy = window.scrollY;
      const ph = document.getElementById('hero-photo-container');
      if (ph && sy < VH) ph.style.transform = `translateY(${sy * 0.15}px)`;
      ticking = false;
    });
  }, { passive: true });

  /* ══ RESIZE ═══════════════════════════════════════════ */
  // Auto-handled by CSS flexbox, no SVG coordinates needed.

  /* ══ MOBILE BURGER ════════════════════════════════════ */
  const burger = document.getElementById('burger-btn');
  const nav    = document.querySelector('.header__nav');
  if (burger && nav) {
    burger.addEventListener('click', () => {
      const open = burger.getAttribute('aria-expanded') === 'true';
      burger.setAttribute('aria-expanded', String(!open));
      if (!open) {
        Object.assign(nav.style, {
          display: 'flex', flexDirection: 'column',
          position: 'absolute', top: '100%', left: '0', right: '0',
          background: 'rgba(0,30,44,0.97)', backdropFilter: 'blur(12px)',
          padding: '24px 32px 32px', gap: '18px', zIndex: '200'
        });
      } else {
        nav.style.display = 'none';
      }
    });
  }

})();
</script>
</body>
</html>
